# Default config skeleton for XAI-guided Evidence Preservation repo

project:
  name: xai-evidence-small-object-detection
  output_root: experiments
  artifact_root: artifacts
  seed: 0

dataset:
  format: yolo
  data_yaml: data/SkyFusion_yolo/data.yaml
  imgsz: 640
  small_object:
    mode: area_px
    tiny_area_threshold: 256
    small_area_threshold: 1024

model:
  family: yolo
  weights: yolov8s.pt
  use_p2: true
  feature_levels:
    P2: null  # fill after inspect_model_layers.py
    P3: null
    P4: null

train:
  epochs: 100
  batch: 16
  device: 0
  workers: 4
  run_name: baseline_yolo_seed0

evaluation:
  conf_threshold: 0.001
  iou_threshold: 0.5
  max_det: 300

xai_evidence:
  enabled: false
  saliency_method: activation_abs_mean
  levels: [P2, P3, P4]
  small_only: true
  allowed_drop: 0.10
  lambda_evidence: 0.05
  mask_mode: expanded_bbox
  bbox_expand_ratio: 1.5
  compute_interval: 1
  max_objects_per_batch: 32
