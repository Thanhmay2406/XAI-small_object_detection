method_name: m8_v1c_runtime_scale_policy
enabled: true
implementation_phase: runtime_integration_ready
policy_source_artifact: artifacts/m8_v1c_automated_policy_mining_preparation/policy_candidate.yaml
supported_scales:
  - P2
  - P3
  - P4
  - P5
size_thresholds:
  small_max_pixel_area: 1024
  medium_max_pixel_area: 9216
size_aware_policy:
  small:
    mode: preferred_scale
    preferred_scale: P3
    weight_delta:
      P2: 1.00
      P3: 1.20
      P4: 0.95
      P5: 0.90
  medium:
    mode: preferred_scale
    preferred_scale: P5
    weight_delta:
      P2: 1.00
      P3: 0.95
      P4: 0.90
      P5: 1.20
  large:
    mode: preferred_scale
    preferred_scale: P5
    weight_delta:
      P2: 1.00
      P3: 0.95
      P4: 0.90
      P5: 1.20
  unknown:
    mode: identity
    weight_delta:
      P2: 1.00
      P3: 1.00
      P4: 1.00
      P5: 1.00
guardrails:
  training_execution_allowed: false
  evaluation_execution_allowed: false
  inference_execution_allowed: false
  dataset_mutation_allowed: false
  checkpoint_mutation_allowed: false
notes:
  - This runtime config is derived from the current M8_v1c policy candidate artifact.
  - The hook is applied immediately before Detect consumes P2/P3/P4/P5.
  - Unknown or ambiguous image-level size groups use identity weights.
